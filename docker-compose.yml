services:
  apex-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: falsetech/apex-dashboard:local
    container_name: apex-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      APEX_DASHBOARD_DATA_DIR: /data
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      TRACKER_API_KEY: ${TRACKER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - apex_dashboard_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  apex_dashboard_data:
