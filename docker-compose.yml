services:
  backend:
    build:
      context: ./FalseTech-Apex-Trial/backend
      dockerfile: Dockerfile
    image: falsetech/apex-dashboard-backend:local
    restart: unless-stopped
    environment:
      TRN_API_KEY: ${TRN_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "127.0.0.1:${APEX_BACKEND_PORT:-8787}:8787"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./FalseTech-Apex-Trial/frontend
      dockerfile: Dockerfile
    image: falsetech/apex-dashboard-frontend:local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APEX_FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  apex-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: falsetech/apex-dashboard:local
    container_name: apex-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      APEX_DASHBOARD_DATA_DIR: /data
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      TRACKER_API_KEY: ${TRACKER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - apex_dashboard_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  apex_dashboard_data:
