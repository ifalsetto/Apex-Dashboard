services:
  backend:
    build:
      context: ./FalseTech-Apex-Trial/backend
      dockerfile: Dockerfile
    image: falsetech/apex-dashboard-backend:local
    restart: unless-stopped
    environment:
      TRN_API_KEY: ${TRN_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "127.0.0.1:${APEX_BACKEND_PORT:-8787}:8787"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: falsetech/apex-dashboard:local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APEX_FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
