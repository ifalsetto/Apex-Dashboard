services:
  simlay-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: falsetech/simlay-ui:local
    restart: unless-stopped
    ports:
      - "8502:8501"
    environment:
      SIMLAY_DATA_DIR: /data
      SIMLAY_API_URL: http://simlay-api:8000
    volumes:
      - simlay_data:/data
    depends_on:
      simlay-api:
        condition: service_healthy

  simlay-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: falsetech/simlay-api:local
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SIMLAY_DATA_DIR: /data
      DATABASE_URL: postgresql://simlay:simlay@simlay-db:5432/simlay
    volumes:
      - simlay_data:/data
    depends_on:
      simlay-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  simlay-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: falsetech/simlay-worker:local
    restart: unless-stopped
    environment:
      SIMLAY_DATA_DIR: /data
      DATABASE_URL: postgresql://simlay:simlay@simlay-db:5432/simlay
      SIMLAY_API_URL: http://simlay-api:8000
    volumes:
      - simlay_data:/data
    depends_on:
      simlay-api:
        condition: service_healthy

  simlay-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: simlay
      POSTGRES_USER: simlay
      POSTGRES_PASSWORD: simlay
    volumes:
      - simlay_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simlay -d simlay"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  simlay_data:
  simlay_db:
