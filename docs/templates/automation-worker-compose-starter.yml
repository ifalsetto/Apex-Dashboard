services:
  worker-name:
    build:
      context: ./workers/worker-name
      dockerfile: Dockerfile
    image: falsetech/worker-name:local
    restart: unless-stopped
    environment:
      FALSETECH_WORKER_DATA_DIR: /data
      WORKER_CONFIG_PATH: /config/worker.env
    volumes:
      - worker_data:/data
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "python", "worker.py", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  worker_data:
